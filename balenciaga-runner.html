<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UA Balenciaga Runner | Yinzer Resells</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .logo img {
      height: 100px !important;
      width: auto !important;
    }
    
    .product-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }

    .product-image {
      width: 100%;
      max-width: 500px;
      height: 400px;
      background-color: #f0f0f0;
      border-radius: 8px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
    }

    .product-details h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      color: #d4af37;
    }

    .product-details p {
      font-size: 1.2em;
      margin-bottom: 15px;
      color: #333;
    }

    .price {
      font-size: 2em;
      font-weight: bold;
      color: #d4af37;
      margin: 30px 0;
    }

    .contact-btn {
      background: gold;
      color: black;
      font-weight: bold;
      padding: 15px 40px;
      border-radius: 5px;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
      font-size: 1.1em;
      border: none;
      cursor: pointer;
    }

    .contact-btn:hover {
      background: #ffed4e;
      transition: 0.3s;
    }

    .back-link {
      margin-top: 30px;
    }

    .back-link a {
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <div class="logo"><img src="IMG_1099.jpeg" alt="Yinzer Resells logo" /></div>

    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="index.html#contact">Contact</a>
    </nav>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </header>

  <!-- PRODUCT SECTION -->
  <section class="product-container">
    <div class="product-image">
      <span>Product Image</span>
    </div>

    <div class="product-details">
      <h1>UA Balenciaga Runner</h1>
      <p>All Colors</p>
      <div class="price">$175</div>
      
      <button class="contact-btn" onclick="contactUs()">Interested? Contact Us!</button>
    </div>

    <div class="back-link">
      <a href="index.html">← Back to Shop</a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 412_resells | Pittsburgh, PA</p>
  </footer>

  <script>
    function toggleMenu() {
      const navMenu = document.getElementById('navMenu');
      navMenu.style.display = navMenu.style.display === 'block' ? 'none' : 'block';
    }

    function contactUs() {
      alert('Contact us on Instagram: @412_resells2026\n\nCash App: $smcizzlegotbred\n\nPayPal: @ShaughnessyCravens\n\nPhone: 412-627-3488');
    }
  </script>
</body>
</html>
